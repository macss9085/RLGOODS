<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>RLGOODS</title>
  <meta content="width=device-width, initial-scale=1" name="viewport" />
  <link rel="stylesheet" href="./css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.2.6/EaselPlugin.min.js"></script>
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>
  <script>
    window.isMobile = /Mobi|Android/i.test(navigator.userAgent);
    window.isSafari = false;
    var _ua = navigator.userAgent.toLowerCase();
    if (_ua.indexOf('safari') !== -1 && _ua.indexOf('chrome') === -1) {
      window.isSafari = true;
    }

    let dpi = window.devicePixelRatio || 1;

    class RAFClass {
      constructor() {
        this.bind();
        this.callbacks = [];
        this.dt = 0.15;
        this.lastF = Date.now();
        this.render();
      }
      subscribe(name, callback) {
        this.callbacks.push({ name: name, callback: callback });
      }
      unsubscribe(name) {
        this.callbacks.forEach((item, i) => {
          if (item.name == name) this.callbacks.splice(i, i + 1);
        });
      }
      render() {
        requestAnimationFrame(this.render);
        this.callbacks.forEach(item => item.callback());
        this.dt = Date.now() - this.lastF;
        this.lastF = Date.now();
      }
      bind() {
        this.subscribe = this.subscribe.bind(this);
        this.unsubscribe = this.unsubscribe.bind(this);
        this.render = this.render.bind(this);
      }
    }

    class SoundReactor {
      constructor(audioUrl, pageType) {
        this.pageType = pageType;
        this.ctx = null;
        this.audio = null;
        this.audioSource = null;
        this.analyser = null;
        this.fdata = [];
        this.url = audioUrl;
        this.bind();
      }
      init() {
        var AudioContext = window.AudioContext || window.webkitAudioContext || false;
        if (!AudioContext) return;
        this.ctx = new AudioContext();
        this.audio = new Audio(this.url);
        this.audio.loop = true;
        if (this.pageType !== 'home') return;
        this.audioSource = this.ctx.createMediaElementSource(this.audio);
        this.analyser = this.ctx.createAnalyser();
        this.analyser.smoothingTimeConstant = 0.4;
        this.audioSource.connect(this.analyser);
        this.audioSource.connect(this.ctx.destination);
        this.fdata = new Uint8Array(this.analyser.frequencyBinCount);
      }
      update() {
        if (this.analyser) this.analyser.getByteFrequencyData(this.fdata);
      }
      bind() {
        this.update = this.update.bind(this);
        this.init = this.init.bind(this);
      }
    }

    class SoundToggler {
      constructor() {
        this.bind();
        this.container = document.querySelector('.soundtoggler');
        this.sTCanvas = document.createElement('canvas');
        this.container.appendChild(this.sTCanvas);
        this.ctx = this.sTCanvas.getContext('2d');
        this.sTWidth = this.ctx.canvas.width = this.container.offsetWidth * dpi;
        this.sTHeight = this.ctx.canvas.height = this.container.offsetHeight * dpi;
        this.ctx.lineWidth = dpi;
        this.soundFlag = false;
        this.amp = { value: 3 };
        this.wL = 0.1;
        this.speed = 0.003;
        this.container.addEventListener('click', this.click);
        window.addEventListener('resize', this.onResize);
        RAF.subscribe('sineUpdate', this.update);
        this.autoPlay = !window.isSafari;
        if (this.autoPlay && JSON.parse(window.localStorage.getItem('audioWasPlaying'))) {
          this.moveFlag = false;
          window.addEventListener('mousemove', this.mouseMove);
        }
      }
      mouseMove() {
        if (!this.autoPlay || this.moveFlag) return;
        this.moveFlag = true;
        this.click();
      }
      update() {
        this.ctx.clearRect(0, 0, this.sTWidth, this.sTHeight);
        this.ctx.beginPath();
        let inc = 0;
        while (inc < this.sTWidth) {
          const y = this.sTHeight / 2 + this.amp.value * dpi *
            Math.sin((inc * (1 / (this.container.offsetWidth * 0.01)) * this.wL) / dpi + Date.now() * this.speed);
          if (inc === 0) this.ctx.moveTo(inc, y);
          else this.ctx.lineTo(inc, y);
          inc += 2;
        }
        this.ctx.stroke();
        this.ctx.closePath();
      }
      started() {
        this.soundFlag = !this.soundFlag;
        TweenLite.to(this.amp, 0.5, { value: this.soundFlag ? 30 : 3 });
      }
      click() {
        let volTarget = this.soundFlag ? 0 : 1;
        if (!this.soundFlag)
          soundReactor.audio.currentTime = window.localStorage.getItem('audioTime') || 0;
        if (soundReactor.audio.duration > 0 && !soundReactor.audio.paused) {
          window.localStorage.setItem('audioWasPlaying', false);
        } else {
          soundReactor.audio.volume = 0;
          soundReactor.audio.play();
          window.localStorage.setItem('audioWasPlaying', true);
        }
        TweenLite.to(this.amp, 0.5, { value: this.soundFlag ? 3 : 30 });
        TweenLite.to(soundReactor.audio, 0.5, {
          volume: volTarget,
          onComplete: () => {
            if (volTarget === 0) {
              window.localStorage.setItem('audioTime', soundReactor.audio.currentTime);
              soundReactor.audio.pause();
            }
          }
        });
        this.soundFlag = !this.soundFlag;
      }
      onResize() {
        this.sTWidth = this.ctx.canvas.width = this.container.offsetWidth * dpi;
        this.sTHeight = this.ctx.canvas.height = this.container.offsetHeight * dpi;
        this.ctx.lineWidth = dpi;
      }
      bind() {
        this.started = this.started.bind(this);
        this.update = this.update.bind(this);
        this.click = this.click.bind(this);
        this.onResize = this.onResize.bind(this);
        this.mouseMove = this.mouseMove.bind(this);
      }
    }

    const RAF = new RAFClass();
  </script>
  <style>
    *, *::after, *::before { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Override webflow CSS that hides .load and .l-over with .hometoggler */
    .load { display: flex !important; }
    .load[style*="display: none"] { display: none !important; pointer-events: none !important; visibility: hidden !important; }
    .load[style*="display: none"] * { pointer-events: none !important; visibility: hidden !important; }
    .l-over { display: none; pointer-events: none !important; }

    /* Disable text selection */
    @media (min-width: 991px) {
      * {
        -webkit-user-select: none;
        user-select: none;
      }
    }

    /* Remove scrollbar */
    ::-webkit-scrollbar { display: none; }
    body { scrollbar-width: none; }

    /* Spline background — always behind the overlay */
    .spline-landing {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      cursor: auto;
    }
    .spline-landing spline-viewer {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      pointer-events: auto !important;
    }

    /* Sound toggler stays on top of Spline after welcome is gone */
    .sound.soundtoggler {
      z-index: 100;
      pointer-events: auto;
    }
    .soundtoggler canvas {
      width: 100%;
      height: 100%;
      pointer-events: auto;
    }


    /* Text stroke styling for l-head */
    .l-head {
      -webkit-text-stroke: 0.8px #e5e3dc;
      -webkit-text-fill-color: transparent;
    }
    @media (max-width: 479px) {
      .l-head {
        -webkit-text-stroke: 0.4px white;
      }
    }

    .text-stroke, .text-stroke-2 {
      -webkit-text-stroke: 0.8px #e5e3dc;
      -webkit-text-fill-color: transparent;
    }

    /* Rotate device notice */
    .rotate {
      display: none;
    }
    @media screen and (orientation: portrait) and (max-width: 767px) {
      .rotate {
        display: flex;
        position: fixed;
        z-index: 99999;
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        color: #e5e3dc;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <!-- Rotate device notice -->
  <div class="rotate">
    <div class="text-block-9">Rotate your device, please.</div>
  </div>

  <!-- Spline landing page — revealed after welcome animation -->
  <div class="spline-landing">
    <spline-viewer
      url="https://prod.spline.design/PBCskNXkSSH73Ku7/scene.splinecode"
    ></spline-viewer>
  </div>

  <!-- Welcome overlay (z-index: 9999 from style.css) -->
  <div class="load" id="welcomeOverlay">
    <div class="l-grid">
      <div class="l-item">
        <h2 class="l-head" id="wt-1">Welcome to</h2>
      </div>
      <div class="l-item">
        <figure class="l-inner" id="wt-2" style="width: 40vw;">
          <div class="text-wrap" style="width: 40vw;">
            <h2 class="text-stroke" style="width: 40vw;">RLGOODS</h2>
            <h2 class="text-fill" id="wt-fill" style="width: 0; max-width: 40vw;">RLGOODS</h2>
          </div>
        </figure>
      </div>
      <div class="l-item">
        <h2 class="l-head" id="wt-3">a place built for</h2>
      </div>
      <div class="l-item">
        <h2 class="l-head" id="wt-4">creators</h2>
      </div>
      <div class="l-item">
        <h2 class="l-head" id="wt-5">&amp; collectors.</h2>
      </div>
    </div>

    <!-- Click-to-start prompt (inside overlay, position:fixed so it covers screen) -->
    <div class="l-over" id="clickPrompt">
      <div class="l-text-w w-clearfix" id="clickText" style="opacity: 0;">
        <div class="l-text">Click anywhere</div>
        <div class="l-arrow w-embed">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 10">
            <defs/>
            <path fill="#e2e2dd" d="M59.2,9.6V6.2h-58v-2c0,0,0,0,0,0h58V0.7L67,5.1L59.2,9.6z"/>
          </svg>
        </div>
        <div class="l-text lt-r">to enable the sound</div>
        <div class="l-text lm">to start</div>
      </div>
    </div>
  </div>

  <!-- Sound toggler hidden for now — causing pointer-events issues
  <a rel="noopener" aria-label="sound" href="#" class="sound soundtoggler w-inline-block"></a>
  -->


  <script>
    // Instantiate SoundToggler (requires RAF + DOM .soundtoggler element)
    let soundToggler = null;
    // if (!window.isMobile) soundToggler = new SoundToggler();
  </script>

  <script>
    window.localStorage.setItem('audioWasPlaying', true);

    const soundReactor = new SoundReactor(
      'https://cdn.jsdelivr.net/gh/niccolomiranda/chiara-luzzana/sound/mainSound.mp3',
      'home'
    );

    if (!window.isMobile) {
      soundReactor.init();
      soundReactor.audio.crossOrigin = 'anonymous';
      if (soundToggler) soundToggler.autoPlay = false;
    }

    // ─── Welcome animation sequence ───────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', function () {
      const overlay    = document.getElementById('welcomeOverlay');
      const clickPrompt = document.getElementById('clickPrompt');
      const clickText  = document.getElementById('clickText');
      const textEls    = ['#wt-1', '#wt-2', '#wt-3', '#wt-4', '#wt-5'];

      // Set initial off-screen state via GSAP so it owns the transforms
      gsap.set(textEls, { y: '105%' });

      // Build the entrance timeline
      const tl = gsap.timeline({ delay: 0.4 });

      textEls.forEach((sel, i) => {
        tl.to(sel, { y: '0%', duration: 0.85, ease: 'power3.out' }, i * 0.14);
      });

      // Animate RLGOODS color-fill reveal alongside its slide-in
      tl.to('#wt-fill', { width: '40vw', duration: 1.1, ease: 'power3.inOut' }, 1 * 0.14);

      // Reveal the "Click anywhere" prompt after text settles
      tl.add(() => {
        clickPrompt.style.display = 'flex';
      }).to(clickText, { opacity: 1, duration: 0.7, ease: 'power2.out' }, '+=0.2');

      // ─── Click handler: start audio & dismiss overlay ──────────────────────

      let dismissed = false;
      overlay.addEventListener('click', function handleClick() {
        if (dismissed) return;
        dismissed = true;
        overlay.removeEventListener('click', handleClick);

        // Start music on desktop
        if (!window.isMobile && soundReactor.ctx) {
          if (soundReactor.ctx.state === 'suspended') soundReactor.ctx.resume();
          soundReactor.audio.volume = 0;
          soundReactor.audio.play().catch(() => {});
          TweenLite.to(soundReactor.audio, 1.2, { volume: 1 });
          RAF.subscribe('fttupdate', soundReactor.update);
          if (soundToggler) soundToggler.started();
        }

        // Slide the overlay up and out
        gsap.to(overlay, {
          yPercent: -100,
          duration: 1.1,
          ease: 'power4.inOut',
          onComplete: () => { overlay.style.display = 'none'; }
        });
      });
    });

  </script>
</body>
</html>
