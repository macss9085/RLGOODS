kind = "web"
previewPath = "/"
title = "RLGOODS"
version = "1.0.0"
id = "artifacts/rlgoods"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24170

[services.development]
run = "pnpm --filter @workspace/rlgoods run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rlgoods", "run", "build" ]
publicDir = "artifacts/rlgoods/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24170"
BASE_PATH = "/"
